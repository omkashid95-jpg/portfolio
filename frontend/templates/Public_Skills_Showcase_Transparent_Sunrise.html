            surface: '#13121b',

    body {
      background-color: #13121b;
      font-family: 'Geist', sans-serif;
      margin: 0;
      overflow-x: hidden;
    }

    /* Glassmorphic card effect */
    .skill-card {
      background: rgba(27, 27, 36, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease;
    }
    
    .skill-card:hover {
      transform: translateY(-5px);
      background: rgba(27, 27, 36, 0.9);
      border-color: #facc15;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
    }

    /* Vertical text styling */
    .vertical-text {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
    }

    /* Background Geometric Accents */
    .bg-accent-shape {
      position: absolute;
      width: 300px;
      height: 300px;
      background: linear-gradient(135deg, #facc15 0%, transparent 70%);
      clip-path: polygon(0 0, 100% 0, 0 100%);
      opacity: 0.8;
      z-index: 0;
    }

    .bg-accent-bottom {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 250px;
      height: 250px;
      background: linear-gradient(315deg, #facc15 0%, transparent 70%);
      clip-path: polygon(100% 0, 100% 100%, 0 100%);
      opacity: 0.8;
      z-index: 0;
